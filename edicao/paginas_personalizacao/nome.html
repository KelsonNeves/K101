<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Personalizar Nome - K101</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Filtro SVG com controles -->
    <svg style="position: absolute; width: 0; height: 0;" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="borda-filete" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
                <!-- Grossura da borda -->
                <feMorphology in="SourceAlpha" operator="dilate" radius="10" result="borda-grossa" id="controle-grossura"/>
                
                <!-- Arredondamento dos cantos -->
                <feGaussianBlur in="borda-grossa" stdDeviation="5" result="borda-blur" id="controle-arredondamento"/>
                
                <!-- Limiarização -->
                <feComponentTransfer in="borda-blur" result="borda-arredondada">
                    <feFuncA type="linear" slope="5" intercept="-0.9"/>
                </feComponentTransfer>
                
                <!-- Cor da borda (dinâmica) -->
                <feColorMatrix in="borda-arredondada" type="matrix" result="borda-cor" id="controle-cor"/>

                <!-- Composição com original -->
                <feComposite in="SourceGraphic" in2="borda-cor" operator="over"/>
            </filter>
        </defs>
    </svg>
    
    <style>
        /* Reset e estilos base */
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* HEADER fixo */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* Container principal centralizado */
        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            display: block;
        }

        /* CABEÇALHO DO EDITOR */
        .cabecalho-editor {
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-voltar {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-voltar:hover {
            background: var(--primary-color);
            color: white;
        }

        .cabecalho-editor h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
        }

        /* PRÉVIA FIXA */
        .previa-container {
            position: -webkit-sticky;
            position: sticky;
            top: 100px;
            width: 100%;
            height: 160px;
            background-color: #f8f9fa;
            background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--primary-color);
            z-index: 950;
            margin-bottom: 30px;
        }

        .conteudo-wrapper {
            width: 100%;
            margin: 0 auto;
        }

        .controles-edicao {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* CARDS */
        .card-editor {
            background: white;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .card-editor:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .card-titulo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .card-titulo i {
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .card-conteudo {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Inputs e controles */
        .campo-texto {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
            color: var(--text-color);
        }

        .campo-texto:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(18, 172, 159, 0.1);
        }

        select.campo-texto {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2em;
            cursor: pointer;
        }

        .selecao-cor {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cor-opcao {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cor-opcao:hover {
            transform: scale(1.1);
        }

        .cor-opcao.selecionada {
            border-color: #333;
            box-shadow: 0 0 0 3px var(--primary-color);
        }

        .checkbox-borda {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            background: #f8f9fa;
            transition: background 0.3s;
            margin-bottom: 0.5rem;
            accent-color: var(--primary-color);
        }

        .checkbox-borda:hover {
            background: #f5f5f5;
        }

        .checkbox-borda input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-borda span {
            font-size: 1rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .controle-deslizante {
            padding: 1.2rem;
            background: #f8f9fa;
            border-radius: 18px;
        }

        .controle-deslizante label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        .controle-deslizante input[type=range] {
            width: 100%;
            height: 8px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border-radius: 4px;
            outline: none;
        }

        .controle-deslizante input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .controle-deslizante input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--primary-color);
        }

        .valor-controle {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Opções de cor */
        .opcoes-cor-borda {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .opcao-cor-borda {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
            transition: background 0.3s;
        }

        .opcao-cor-borda:hover {
            background: #e9ecef;
        }

        .opcao-cor-borda input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #ccc;
            border-radius: 50%;
            margin-right: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .opcao-cor-borda input[type="radio"]:checked {
            border-color: var(--primary-color);
            background-color: white;
        }

        .opcao-cor-borda input[type="radio"]:checked::before {
            content: "";
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: block;
        }

        .cor-preview {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            border: 2px solid #333;
        }

        .cor-preview.preta {
            background: black;
        }

        .cor-preview.branca {
            background: white;
        }

        /* Destaques */
        .opcoes-destaque {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 18px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .checkbox-option:hover {
            background: #e9ecef;
        }

        .checkbox-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* Preço e Quantidade */
        .preco-quantidade-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0;
        }

        .preco-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .preco-label {
            color: #666;
            font-size: 1rem;
        }

        .preco-valor {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .quantidade-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .quantidade-controles {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 40px;
        }

        .quantidade-btn {
            width: 38px;
            height: 38px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text-color);
        }

        .quantidade-btn:hover:not(:disabled) {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .quantidade-input {
            width: 50px;
            height: 38px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            background: white;
            color: var(--text-color);
        }

        .quantidade-input::-webkit-inner-spin-button,
        .quantidade-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .preco-total-container {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            text-align: right;
            padding: 1.5rem 0 0.5rem;
            border-top: 2px dashed var(--border-color);
            margin-top: 0.5rem;
            text-align:center;
        }

        .btn-adicionar {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-adicionar:hover {
            transform: translateY(-2px);
            
        }

        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Loading */
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* Responsividade */
        @media (max-width: 1200px) {
            .previa-container {
                right: calc(50% - 400px);
                width: 800px;
            }
        }

        @media (max-width: 992px) {
            .previa-container {
                position: fixed;
                top: auto;
                bottom: 20px;
                right: 20px;
                left: 20px;
                width: auto;
                height: 140px;
                z-index: 1000;
                box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            }
            
            .conteudo-wrapper {
                margin-bottom: 180px;
            }
            
            .cabecalho-editor {
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            .card-editor {
                padding: 1.5rem;
            }
            
            .preco-valor {
                font-size: 1.5rem;
            }
            
            .switch {
                width: 46px;
                height: 22px;
            }
            
            .slider:before {
                height: 16px;
                width: 16px;
                transform: translateX(24px);
            }
        }

        @media (max-width: 480px) {
            .card-titulo {
                font-size: 1.1rem;
            }
            
            .preco-quantidade-container {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .cor-opcao {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="loading-overlay" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
    ">
        <img src="../../imagens/logo1.png" alt="Logo K101" style="
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        ">

        <div class="loader"></div>

        <p style="margin-top: 20px; color: var(--primary-color); font-weight: 600; font-family: sans-serif; letter-spacing: 1px;">
            PREPARANDO EDITOR...
        </p>
    </div>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo-container" onclick="window.location.href='../../nav.html'" style="cursor: pointer;">
                    <img src="../../imagens/logo.png" alt="K101" class="logo">
                    <h1>K101</h1>
                </div>
            </div>
            <div class="carrinho-icon">
                <a href="../../carrinho.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="carrinho-count" id="carrinho-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- MENU LATERAL -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button class="sidebar-close" id="sidebar-close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="sidebar-content">
            <ul class="sidebar-menu">
                <li><a href="../../nav.html"><i class="fas fa-home"></i>Todos os Serviços</a></li>
                <li><a href="#"><i class="fas fa-question-circle"></i> Em manutenção</a></li>
            </ul>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- CABEÇALHO -->
        <div class="cabecalho-editor">
            <button class="btn-voltar" onclick="window.location.href='../../nav.html'">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
            <h1>Personalização de adesivos</h1>
        </div>

        <!-- PRÉVIA FIXA -->
        <div class="previa-container">
            <div class="previa-adesivo-container">
                <svg id="svg-editor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
                    <defs>
                        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                            <feOffset dx="2" dy="2" />
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.5" />
                            </feComponentTransfer>
                            <feMerge>
                                <feMergeNode />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <g filter="url(#dropShadow)">
                        <text id="svg-texto-contorno" fill="none" stroke-width="0" stroke-linejoin="round" stroke-linecap="round"></text>
                        <text id="svg-texto-frente"></text>
                    </g>
                </svg>
            </div>
        </div>

        <!-- CONTEÚDO -->
<div class="conteudo-wrapper">
    <div class="controles-edicao">
        
        <!-- CARD: NOME -->
        <div class="card-editor">
            <div class="card-titulo">
                <i class="fas fa-pencil-alt"></i>
                <span>Nome</span>
            </div>
            <div class="card-conteudo">
                <input type="text" id="texto-adesivo" class="campo-texto" placeholder="Ex: Ana, João, Maria..." value="">
            </div>
        </div>

        <!-- CARD: FONTE -->
        <div class="card-editor">
            <div class="card-titulo">
                <i class="fas fa-font"></i>
                <span>Fonte</span>
            </div>
            <div class="card-conteudo">
                <select id="selecao-fonte" class="campo-texto"></select>
            </div>
        </div>

        <!-- CARD: COR PRINCIPAL -->
        <div class="card-editor">
            <div class="card-titulo">
                <i class="fas fa-palette"></i>
                <span>Cor Principal</span>
            </div>
            <div class="card-conteudo">
                <select id="selecao-tipo-adesivo" class="campo-texto">
                    <option value="vinil">Vinil Brilho</option>
                    <option value="refletivo">Refletivo</option>
                    <option value="metalico">Metálico / Cromado</option>
                    <option value="fluorescente">Fluorescente (Neon)</option>
                </select>
                <div class="selecao-cor" id="selecao-cor"></div>
            </div>
        </div>

        <!-- CARD: DESTAQUES ESPECIAIS -->
        <div class="card-editor">
            <div class="card-titulo">
                <i class="fas fa-star"></i>
                <span>Destaques Especiais</span>
            </div>
            <div class="card-conteudo">
                <label class="checkbox-borda">
                    <input type="checkbox" id="destaques-ativo">
                    <span>Adicionar Destaques</span>
                </label>
                
                <div id="controles-destaques" style="display: none;">
                    <div style="margin-bottom: 1rem;">
                        <select id="selecao-tipo-secundario" class="campo-texto">
                            <option value="vinil">Vinil Brilho</option>
                            <option value="refletivo">Refletivo</option>
                            <option value="metalico">Metálico / Cromado</option>
                            <option value="fluorescente">Fluorescente (Neon)</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <div class="selecao-cor" id="selecao-cor-secundaria"></div>
                    </div>

                    <div>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" id="destaque-primeira-letra" checked>
                                <span>Primeira letra</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="destaque-primeiras-letras" checked>
                                <span>Iniciais</span>
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="destaque-especiais">
                                <span>Caracteres especiais</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        

        <!-- CARD: BORDA -->
        <div class="card-editor">
            <div class="card-titulo">
                <i class="fas fa-border-all"></i>
                <span>Borda</span>
            </div>
            <div class="card-conteudo">
                <label class="checkbox-borda">
                    <input type="checkbox" id="borda-ativa">
                    <span>Adicionar Borda</span>
                </label>
                
                <div id="controles-filete" style="display: none;">
                    <div class="opcoes-cor-borda">
                        <label class="opcao-cor-borda">
                            <input type="radio" name="cor-borda" id="borda-preta" value="preta" checked>
                            <span class="cor-preview preta"></span>
                        </label>
                        <label class="opcao-cor-borda">
                            <input type="radio" name="cor-borda" id="borda-branca" value="branca">
                            <span class="cor-preview branca"></span>
                        </label>
                    </div>

                    <div class="controle-deslizante">
                        <label>
                            <span>Grossura</span>
                            <span class="valor-controle" id="grossura-valor">3</span>

        // ===== FUNÇÕES =====

            document.getElementById('preco-unitario').textContent = `R$ ${precoUnitario.toFixed(2)}`;

                } else {

                }

        }

        function eCorClara(color) {
            const hex = color.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            
            const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            
            return luma > 128;
        }

        function atualizarFundoPrevia() {

        function aplicarDestaquesAoTexto(texto, corPrincipal, corSecundaria) {
    if (!destaquesAtivo || !texto) return { textoPrincipal: texto, destaques: [] };
    
    const destaques = [];
    const posicoesDestaque = new Set(); // Usar Set para evitar duplicatas
    
    // Verificar quais checkboxes estão ativos
    const primeiraAtivo = document.getElementById('destaque-primeira-letra').checked;
    const primeirasAtivo = document.getElementById('destaque-primeiras-letras').checked;
    const especiaisAtivo = document.getElementById('destaque-especiais').checked;
    
    // Se nenhuma opção estiver ativa, não aplica destaques
    if (!primeiraAtivo && !primeirasAtivo && !especiaisAtivo) {
        return { textoPrincipal: texto, destaques: [] };
    }
    
    // 1. Destacar primeira letra (se ativo)
    if (primeiraAtivo && texto.length > 0) {
        const primeiraLetra = texto[0];
        // CORREÇÃO: Verifica se é letra (incluindo acentuadas) ou número
        if (/[a-zA-Z0-9\u00C0-\u00FF]/.test(primeiraLetra)) {
            posicoesDestaque.add(0);
        }
    }
    
    // 2. Destacar primeiras letras de cada palavra
    if (primeirasAtivo) {
        // CORREÇÃO: Considera apenas espaços e caracteres NÃO letras/números como separadores
        // Letras acentuadas são consideradas parte da palavra
        let i = 0;
        while (i < texto.length) {
            // Pular caracteres que NÃO são letras (incluindo acentuadas) e números
            while (i < texto.length && !/[a-zA-Z0-9\u00C0-\u00FF]/.test(texto[i])) {
                i++;
            }
            
            // Se encontrou o início de uma palavra (letra ou número, incluindo acentuadas)
            if (i < texto.length && /[a-zA-Z0-9\u00C0-\u00FF]/.test(texto[i])) {
                posicoesDestaque.add(i);
                // Avançar até o final da palavra (enquanto for letra ou número, incluindo acentuadas)
                while (i < texto.length && /[a-zA-Z0-9\u00C0-\u00FF]/.test(texto[i])) {
                    i++;
                }
            }
        }
    }
    
    // 3. Destacar caracteres especiais (se ativo)
    if (especiaisAtivo) {
        for (let i = 0; i < texto.length; i++) {
            const char = texto[i];
            // CORREÇÃO: Caracteres especiais são tudo que NÃO é letra (incluindo acentuadas), número ou espaço
            if (!/[a-zA-Z0-9\u00C0-\u00FF\s]/.test(char)) {
                posicoesDestaque.add(i);
            }
        }
    }
    
    // Converter Set para array de objetos
    const destaquesArray = Array.from(posicoesDestaque)
        .sort((a, b) => a - b)
        .map(posicao => ({
            posicao: posicao,
            caractere: texto[posicao]
        }));
    
    return { textoPrincipal: texto, destaques: destaquesArray };
}

        function criarTextoDestaqueSVG(texto, corPrincipal, corSecundaria) {
    const { destaques } = aplicarDestaquesAoTexto(texto, corPrincipal, corSecundaria);
    
    if (destaques.length === 0) {
        return `<tspan fill="${corPrincipal}" x="400" dy="0">${texto}</tspan>`;
    }
    
    let resultado = '';
    let ultimaPosicao = 0;
    
    destaques.forEach((destaque) => {
        if (destaque.posicao > ultimaPosicao) {
            resultado += `<tspan fill="${corPrincipal}">${texto.substring(ultimaPosicao, destaque.posicao)}</tspan>`;
        }
        
        resultado += `<tspan fill="${corSecundaria}">${destaque.caractere}</tspan>`;
        ultimaPosicao = destaque.posicao + 1;
    });
    
    if (ultimaPosicao < texto.length) {
        resultado += `<tspan fill="${corPrincipal}">${texto.substring(ultimaPosicao)}</tspan>`;
    }
    
    return `<tspan x="400" dy="0">${resultado}</tspan>`;
}

        function atualizarPrevia(deveRedimensionar = false) {
    const texto = textoInput.value.trim() || '';
    const familiaFonte = fonteSelecionada.arquivo.startsWith('url(') ? `'${fonteSelecionada.nome}'` : fonteSelecionada.arquivo;
    
    // Limpar conteúdo anterior
    while (svgTextoFrente.firstChild) svgTextoFrente.removeChild(svgTextoFrente.firstChild);
    while (svgTextoContorno.firstChild) svgTextoContorno.removeChild(svgTextoContorno.firstChild);
    
    if (!texto) {
        atualizarFundoPrevia();
        atualizarPrecos();
        return;
    }

    // Configurações base de estilo
    [svgTextoFrente, svgTextoContorno].forEach(el => {
        el.style.fontFamily = familiaFonte;
        el.style.fontSize = "80px";
        el.style.fontWeight = "bold";
        el.setAttribute('x', '400');
        el.setAttribute('y', '100');
    });

    // Medição para centralização
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");
    context.font = `bold 80px ${familiaFonte}`;

    let larguras = [];
    let larguraTotal = 0;
    for (let char of texto) {
        let larguraChar = context.measureText(char).width;
        larguras.push(larguraChar);
        larguraTotal += larguraChar;
    }

    let xAtual = 400 - (larguraTotal / 2);
    const { destaques } = aplicarDestaquesAoTexto(texto, corSelecionada.codigo, corSecundariaSelecionada.codigo);

    // Definimos o estilo de junção baseado no checkbox de arredondamento
    const lineJoin = arredondamentoAtual > 0 ? 'round' : 'miter';

    // Renderizar de TRÁS PARA FRENTE (Z-index: a primeira letra será a última no DOM)
    for (let i = texto.length - 1; i >= 0; i--) {
        const char = texto[i];
        let xLetra = xAtual;
        for(let j = 0; j < i; j++) {
            xLetra += larguras[j];
        }

        const isDestaque = destaquesAtivo && destaques.some(d => d.posicao === i);
        const cor = isDestaque ? corSecundariaSelecionada.codigo : corSelecionada.codigo;

        // Frente
        const tspanF = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
        tspanF.textContent = char;
        tspanF.setAttribute('x', xLetra);
        tspanF.setAttribute('y', '100');
        tspanF.setAttribute('fill', cor);
        tspanF.style.fontFamily = familiaFonte;
        svgTextoFrente.appendChild(tspanF);

        // Contorno (Borda)
        if (bordaAtiva) {
            const tspanC = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspanC.textContent = char;
            tspanC.setAttribute('x', xLetra);
            tspanC.setAttribute('y', '100');
            tspanC.style.fontFamily = familiaFonte;
            // AQUI: Aplicamos o arredondamento individualmente em cada letra da borda
            tspanC.setAttribute('stroke-linejoin', lineJoin);
            tspanC.setAttribute('stroke-linecap', 'round');
            svgTextoContorno.appendChild(tspanC);
        }
    }

    // Configurar estilos globais da borda
    if (bordaAtiva) {
        const corHexBorda = corBorda === 'preta' ? '#000000' : '#FFFFFF';
        svgTextoContorno.setAttribute('fill', 'none');
        svgTextoContorno.setAttribute('stroke', corHexBorda);
        svgTextoContorno.setAttribute('stroke-width', grossuraAtual * 3);
        svgTextoContorno.setAttribute('stroke-linejoin', lineJoin); // Reforço no container pai
        svgTextoContorno.style.display = 'block';
    } else {
        svgTextoContorno.style.display = 'none';
    }

    if (deveRedimensionar) {
        setTimeout(() => {
            const svgEditor = document.getElementById('svg-editor');
            const grupoSvg = svgEditor.querySelector('g');
            const bbox = grupoSvg.getBBox();
            if (bbox.width > 0) {
                const margem = 40;
                svgEditor.setAttribute('viewBox', `${bbox.x - margem} ${bbox.y - margem} ${bbox.width + (margem * 2)} ${bbox.height + (margem * 2)}`);
            }
        }, 50);
    }

    atualizarFundoPrevia();
    atualizarPrecos();
}

async function capturarPreviaComoImagem() {
    try {
        const svgOriginal = document.getElementById('svg-editor');
        const grupo = svgOriginal.querySelector('g');
        const bbox = grupo.getBBox();
        const margem = 20;

        const svgClonado = svgOriginal.cloneNode(true);
        svgClonado.removeAttribute('filter');

        const vx = bbox.x - margem;
        const vy = bbox.y - margem;
        const vw = bbox.width + (margem * 2);
        const vh = bbox.height + (margem * 2);
        svgClonado.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
        svgClonado.setAttribute('width', '200');
        svgClonado.setAttribute('height', '100');

        // Tenta converter fonte se for arquivo
        try {
            const urlFonte = fonteSelecionada.arquivo.replace('url("', '').replace('")', '');
            if (urlFonte !== fonteSelecionada.arquivo) {
                const resposta = await fetch(urlFonte);
                const blob = await resposta.blob();
                
                const reader = new FileReader();
                const fonteBase64 = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });

                const estilo = document.createElementNS("http://www.w3.org/2000/svg", "style");
                estilo.textContent = `
                    @font-face {
                        font-family: '${fonteSelecionada.nome}';
                        src: url('${fonteBase64}');
                    }
                    text, tspan { 
                        font-family: '${fonteSelecionada.nome}' !important;
                    }
                `;
                svgClonado.prepend(estilo);
            }
        } catch (e) {
            console.warn("Não foi possível converter a fonte, usando fallback");
        }

        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svgClonado);
        return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
        
    } catch (error) {
        console.error('Erro ao converter imagem:', error);
        // Fallback: retorna o SVG original como string
        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(document.getElementById('svg-editor'));
        return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
    }
}

        // ===== EVENT LISTENERS =====
        function configurarEventListeners() {
            textoInput.addEventListener('input', () => atualizarPrevia(true));

            corContainer.addEventListener('click', (e) => {
                const corDiv = e.target.closest('.cor-opcao');
                if (!corDiv) return;
                document.querySelectorAll('#selecao-cor .cor-opcao').forEach(c => c.classList.remove('selecionada'));
                corDiv.classList.add('selecionada');
                corSelecionada = {
                    nome: corDiv.dataset.nome,
                    codigo: corDiv.dataset.cor
                };
                atualizarPrevia(false);
                atualizarFundoPrevia();
                atualizarPrecos();
            });

            corSecundariaContainer.addEventListener('click', (e) => {
                const corDiv = e.target.closest('.cor-opcao');
                if (!corDiv) return;
                document.querySelectorAll('#selecao-cor-secundaria .cor-opcao').forEach(c => c.classList.remove('selecionada'));
                corDiv.classList.add('selecionada');
                corSecundariaSelecionada = {
                    nome: corDiv.dataset.nome,
                    codigo: corDiv.dataset.cor
                };
                if (destaquesAtivo) {
                    atualizarPrevia(false);
                }
            });

            fonteSelect.addEventListener('change', (e) => {
                const fonteNome = e.target.value;
                fonteSelecionada = FONTES_DISPONIVEIS.find(f => f.nome === fonteNome);

            });

            bordaCheckbox.addEventListener('change', (e) => {
                bordaAtiva = e.target.checked;
                controlesFilete.style.display = bordaAtiva ? 'block' : 'none';
                if (bordaAtiva) {

                }
                atualizarFundoPrevia();
                atualizarPrevia(false);
                atualizarPrecos();
            });

            grossuraSlider.addEventListener('input', (e) => {
                grossuraAtual = parseInt(e.target.value);
                grossuraValor.textContent = grossuraAtual;
                if (bordaAtiva) atualizarFiltro(grossuraAtual, arredondamentoAtual, corBorda);
                atualizarPrevia(false);
            });

            if (arredondamentoCheckbox) {
                arredondamentoCheckbox.addEventListener('change', (e) => {
                    arredondamentoAtual = e.target.checked ? 1 : 0;
                    if (bordaAtiva) atualizarFiltro(grossuraAtual, arredondamentoAtual, corBorda);
                    atualizarPrevia(false);
                });
            }

            bordaPretaRadio.addEventListener('change', (e) => {
                if (e.target.checked) {
                    corBorda = 'preta';
                    if (bordaAtiva) atualizarFiltro(grossuraAtual, arredondamentoAtual, corBorda);
                    atualizarPrevia(false);
                    atualizarPrecos();
                    atualizarFundoPrevia();
                }
            });

            bordaBrancaRadio.addEventListener('change', (e) => {
                if (e.target.checked) {
                    corBorda = 'branca';
                    if (bordaAtiva) atualizarFiltro(grossuraAtual, arredondamentoAtual, corBorda);
                    atualizarPrevia(false);
                    atualizarPrecos();
                    atualizarFundoPrevia();
                }
            });

            document.getElementById('selecao-tipo-adesivo').addEventListener('change', (e) => {
                tipoSelecionado = e.target.value;
                renderizarCores(tipoSelecionado, corContainer);
                atualizarPrevia(false);
                atualizarPrecos();
            });

            // NOVOS EVENT LISTENERS PARA DESTAQUES
            destaquesCheckbox.addEventListener('change', (e) => {
                destaquesAtivo = e.target.checked;
                controlesDestaques.style.display = destaquesAtivo ? 'block' : 'none';
                atualizarPrevia(false);
                atualizarPrecos();
            });

            tipoSecundarioSelect.addEventListener('change', (e) => {
                tipoSecundarioSelecionado = e.target.value;
                renderizarCores(tipoSecundarioSelecionado, corSecundariaContainer);
                if (destaquesAtivo) {
                    atualizarPrevia(false);
                }
            });

            destaquePrimeiraLetra.addEventListener('change', () => {
                if (destaquesAtivo) atualizarPrevia(false);
            });

            destaquePrimeirasLetras.addEventListener('change', () => {
                if (destaquesAtivo) atualizarPrevia(false);
            });

            destaqueEspeciais.addEventListener('change', () => {
                if (destaquesAtivo) atualizarPrevia(false);
            });

            document.getElementById('adicionar-carrinho').addEventListener('click', adicionarAoCarrinho);
        }

        async function adicionarAoCarrinho() {
    const btn = document.querySelector('.btn-adicionar');
    const originalHtml = btn.innerHTML;

    try {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

        const texto = textoInput.value.trim();
        if (!texto) {
            mostrarNotificacao('❌ Digite um nome para o adesivo');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            return;
        }

        const imagemPrevia = await capturarPreviaComoImagem();
        
        const urlFonte = fonteSelecionada.arquivo.replace(/url\(["']?|["']?\)/g, "");
        const font = await opentype.load(urlFonte);
        
        const fontSize = 80;
        const xCentro = 400;
        const yBase = 120;
        
        // CORREÇÃO: Gerar SVG com destaques se ativo
        let svgString;
        
        if (destaquesAtivo) {
            const { destaques } = aplicarDestaquesAoTexto(texto, corSelecionada.codigo, corSecundariaSelecionada.codigo);
            
            if (destaques.length > 0) {
                let pathsHtml = '';
                let largurasAcumuladas = [];
                let larguraTotal = 0;

                // Primeiro, calculamos a posição X de cada letra
                for (let i = 0; i < texto.length; i++) {
                    largurasAcumuladas.push(larguraTotal);
                    larguraTotal += font.getAdvanceWidth(texto[i], fontSize);
                }

                const xInicioGeral = xCentro - (larguraTotal / 2);

                // Renderizamos de TRÁS PARA FRENTE (da última letra para a primeira)
                // Isso garante que a letra anterior sempre fique por cima da próxima
                for (let i = texto.length - 1; i >= 0; i--) {
                    const caractere = texto[i];
                    const xLetra = xInicioGeral + largurasAcumuladas[i];
                    
                    const pathData = font.getPath(caractere, xLetra, yBase, fontSize).toPathData(2);
                    
                    const isDestaque = destaques.some(d => d.posicao === i);
                    const cor = isDestaque ? corSecundariaSelecionada.codigo : corSelecionada.codigo;
                    
                    pathsHtml += `<path d="${pathData}" fill="${cor}" />`;
                }
                
                // Adicionar borda se ativa
                const corHexBorda = corBorda === 'preta' ? '#000000' : '#FFFFFF';
                const strokeWidth = bordaAtiva ? (grossuraAtual * 3) : 0;
                const lineJoin = arredondamentoAtual > 0 ? 'round' : 'miter';
                
                svgString = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <g>
        ${bordaAtiva ? `
        <path d="${font.getPath(texto, xCentro - (font.getAdvanceWidth(texto, fontSize) / 2), yBase, fontSize).toPathData(2)}" 
            fill="none" 
            stroke="${corHexBorda}" 
            stroke-width="${strokeWidth}" 
            stroke-linejoin="${lineJoin}" 
            stroke-linecap="round" />` : ''}
        
        ${pathsHtml}
    </g>
</svg>`;
            } else {
                // Fallback para SVG simples se não houver destaques
                const textWidth = font.getAdvanceWidth(texto, fontSize);
                const xInicio = xCentro - (textWidth / 2);
                const pathData = font.getPath(texto, xInicio, yBase, fontSize).toPathData(2);
                
                const corHexBorda = corBorda === 'preta' ? '#000000' : '#FFFFFF';
                const strokeWidth = bordaAtiva ? (grossuraAtual * 3) : 0;
                const lineJoin = arredondamentoAtual > 0 ? 'round' : 'miter';

                svgString = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <g>
        ${bordaAtiva ? `
        <path d="${pathData}" 
            fill="none" 
            stroke="${corHexBorda}" 
            stroke-width="${strokeWidth}" 
            stroke-linejoin="${lineJoin}" 
            stroke-linecap="round" />` : ''}
        
        <path d="${pathData}" 
            fill="${corSelecionada.codigo}" />
    </g>
</svg>`;
            }
        } else {
            // SVG sem destaques (código original)
            const textWidth = font.getAdvanceWidth(texto, fontSize);
            const xInicio = xCentro - (textWidth / 2);
            const pathData = font.getPath(texto, xInicio, yBase, fontSize).toPathData(2);
            
            const corTexto = corSelecionada.codigo;
            const corHexBorda = corBorda === 'preta' ? '#000000' : '#FFFFFF';
            const strokeWidth = bordaAtiva ? (grossuraAtual * 3) : 0;
            const lineJoin = arredondamentoAtual > 0 ? 'round' : 'miter';

            svgString = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <g>
        ${bordaAtiva ? `
        <path d="${pathData}" 
            fill="none" 
            stroke="${corHexBorda}" 
            stroke-width="${strokeWidth}" 
            stroke-linejoin="${lineJoin}" 
            stroke-linecap="round" />` : ''}
        
        <path d="${pathData}" 
            fill="${corTexto}" />
    </g>
</svg>`;
        }

        const svgBase64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));

        const novoItem = {
            icone_produto: 'fa-paint-brush',
            id: Date.now().toString(),
            nome: "Adesivo: " + texto,
            texto: texto,
            preco: calcularPrecoUnitario(),
            quantidade: parseInt(document.getElementById('quantidade-personalizado')?.value || 1),
            imagem: imagemPrevia,
            tipo: tipoSelecionado,
            cor: corSelecionada.nome,
            destaquesAtivo: destaquesAtivo,
            tipoDestaque: tipoDestaqueSelecionado,
            corSecundaria: destaquesAtivo ? corSecundariaSelecionada.nome : null,
            servico: 'Nome_personalizado',
            dataCriacao: new Date().toISOString()
        };

        if (svgBase64 && typeof svgBase64 === 'string' && svgBase64 !== 'undefined') {
            novoItem.svgRaw = svgBase64;
        }

        const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        carrinho.push(novoItem);
        localStorage.setItem('carrinho', JSON.stringify(carrinho));

        if (typeof window.atualizarContadorCarrinho === 'function') {
            window.atualizarContadorCarrinho();
        } else {
            const totalItens = carrinho.reduce((total, item) => total + item.quantidade, 0);
            const carrinhoCount = document.getElementById('carrinho-count');
            if (carrinhoCount) carrinhoCount.textContent = totalItens;
        }
        
        mostrarNotificacao('✅ Adesivo adicionado ao carrinho!');
        
        setTimeout(() => {
            window.location.href = '../../carrinho.html';
        }, 1000);

    } catch (error) {
        console.error("Erro detalhado:", error);
        mostrarNotificacao('❌ Erro ao adicionar ao carrinho: ' + error.message);
        btn.disabled = false;
        btn.innerHTML = originalHtml;
    }
}

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', () => {
            const loadingOverlay = document.getElementById('loading-overlay');
            
            setTimeout(() => {
                loadingOverlay.classList.add('loading-hidden');
                setTimeout(() => loadingOverlay.remove(), 500);
            }, 1500);

            inicializarOpcoes();
            configurarEventListeners();
            configurarMenuLateral();
            atualizarPrevia(true);

            window.atualizarContadorCarrinho = function() {
                const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
                const totalItens = carrinho.reduce((total, item) => total + item.quantidade, 0);
                const carrinhoCount = document.getElementById('carrinho-count');
                if (carrinhoCount) carrinhoCount.textContent = totalItens;
            };
            atualizarContadorCarrinho();
            atualizarPrecos();
            atualizarFiltro(grossuraAtual, arredondamentoAtual, corBorda);
            atualizarFundoPrevia();
            window.atualizarContadorCarrinho = atualizarContadorCarrinho;
        });
    </script>
