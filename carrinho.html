<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Minha Loja de Adesivos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Minha Logo" class="logo">
                <h1>Meu Carrinho</h1>
            </div>
            <a href="nav.html" class="voltar-btn">
                <i class="fas fa-arrow-left"></i> Voltar às compras
            </a>
        </div>
    </header>

    <main class="carrinho-container">
        <div class="carrinho-items" id="carrinho-items">
            <!-- Items serão carregados aqui -->
        </div>
        
        <div class="carrinho-resumo" id="carrinho-resumo">
            <!-- Resumo será carregado aqui -->
        </div>
    </main>

    <script src="carrinho.js"></script>
</body>

</html>
