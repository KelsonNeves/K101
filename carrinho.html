<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Carrinho - K101</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
                 
* {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

/* Permite seleção de texto apenas em inputs e áreas de texto */
input[type="text"],
input[type="number"],
textarea,
select {
    -webkit-user-select: text;
    user-select: text;
}



/* Estilos adicionais para o campo de nome */
    .cliente-info {
        position:relative;
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 200px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: 1px solid #e0e0e0;
        z-index: 100;
    }

    #cliente-info2 {
        position:absolute;
        width: calc(100% - 64px);
        margin-top: 245px;
        background: var(--primary-color);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 5px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: 1px solid #e0e0e0;
        top: -40px;
        height: 70px;
        z-index: 1;
        transition: all 0.2s;
    }
    #observacao-cliente{
        width: 100%;
        height: 120px;
        margin-top: 10px;
        border: 0px;
    }
    #btn-observacoes{
        position: absolute;
        width: calc(100% - 40px);
        height: 25px;
        background-color:color-mix(in srgb, var(--primary-color), rgba(255, 255, 255, 0.404));
        border-radius: 15px;
        border: 0px solid;
        color: #fafafa;
        transition: all 0.2s;
        margin-top: 10px;
        margin-bottom: 8px;
        bottom:5px;
        

    } #btn-observacoes:hover{
        box-shadow: 0 0 5px #00000036;
        transform: translate(0, -1px);
       

    }
    
    
    .cliente-info h3 {
        color: var(--primary-color);
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .cliente-info h3 i {
        font-size: 1.3rem;
    }
        
    .campo-nome {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s;
        box-sizing: border-box;
    }
    
    .campo-nome:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
    }
    
    .campo-nome.error {
        border-color: #ff4444;
        background-color: #fff8f8;
    }
    
    .mensagem-erro {
        color: #ff4444;
        font-size: 0.85rem;
        margin-top: 5px;
        display: none;
        align-items: center;
        gap: 4px;
    }
    
    .mensagem-erro.mostrar {
        display: flex;
    }
    
    .mensagem-erro i {
        font-size: 0.9rem;
    }

.carrinho-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 350px;
    gap: 2rem;
}

.carrinho-items {
    background: white;
    border-radius: 15px;
    padding: 2rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.carrinho-item {
    display: grid;
    grid-template-columns: 100px 1fr auto auto 40px; /* Adiciona coluna para a lixeira */
    gap: 1rem;
    align-items: center;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border-color);
}

.item-remove {
    color: var(--danger-color);
    cursor: pointer;
    font-size: 1.1rem;
    transition: transform 0.3s;
    justify-self: end;
}

.item-imagem {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
}

.item-info h3 {
    margin-bottom: 0.5rem;
    color: var(--text-color);
    font-size: 1.1rem;
}

.item-preco {
    color: var(--primary-color);
    font-weight: bold;
}

.item-quantidade {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.quantidade-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantidade-controles {
            display: flex;
            position: relative;
            align-items: center;
            gap: 5px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 40px;
        }

        .quantidade-btn {
            width: 38px;
            height: 38px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text-color);
        }

        .quantidade-btn:hover:not(:disabled) {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .quantidade-input {
            width: 50px;
            height: 38px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            background: white;
            color: var(--text-color);
        }

        .quantidade-input::-webkit-inner-spin-button,
        .quantidade-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }






.item-total {
    font-weight: bold;
    color: var(--primary-color);
}

.item-remove {
    color: var(--danger-color);
    cursor: pointer;
    font-size: 1.2rem;
    transition: transform 0.3s;
}

.item-remove:hover {
    transform: scale(1.2);
}

.carrinho-resumo {
    background: white;
    border-radius: 15px;
    padding: 2rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    height: fit-content;
    position: sticky;
    top: 100px;
}

.resumo-linha {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
    margin-bottom: 1rem;
    padding: 0.5rem 0;
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--primary-color);
    border-bottom: 2px dashed var(--primary-color);
    
}


.btn-finalizar {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1rem;
    transition: all 0.3s;
}

.btn-finalizar:hover {
    transform: translateY(-2px);
}

.btn-finalizar:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.btn-finalizar:disabled:hover {
    transform: none;
    box-shadow: none;
}



.btn-limpar {
    width: 100%;
    padding: 1rem;
    background: transparent;
    color: var(--danger-color);
    border: 2px solid var(--danger-color);
    border-radius: 30px;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1rem;
    transition: all 0.3s;
}

.btn-limpar:hover {
    background: var(--danger-color);
    color: white;
    transform: translateY(-2px);
    
}


.carrinho-vazio {
    text-align: center;
    padding: 3rem;
    color: #666;
}

.carrinho-vazio i {
    font-size: 4rem;
    margin-bottom: 1rem;
    color: var(--border-color);
}

.voltar-btn {
    color: white;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border: 2px solid white;
    border-radius: 25px;
    transition: all 0.3s;
}

.voltar-btn:hover {
    background: white;
    color: var(--primary-color);
}


@media (max-width: 1000px) {
    .carrinho-container {
        grid-template-columns: 1fr;
    }
    
    .carrinho-item {
        grid-template-columns: 80px 1fr;
        grid-template-rows: auto auto;
    }
    
    .item-imagem {
        grid-row: span 2;
    }
    
    .item-info {
        grid-column: 2;
    }
    
    .item-quantidade {
        grid-column: 2;
        grid-row: 2;
    }
    
    .item-total {
        grid-column: 2;
        grid-row: 2;
        margin-left: 120px;
    }
    .cliente-info {
        margin-bottom: 20px;

    }

    #cliente-info2 {
        margin-top: 0px;
        position: relative;
        width:100%;
        margin-bottom: -40px;
    }
}
        
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Minha Logo" class="logo">
            </div>
            <a href="index.html" class="voltar-btn">
                <i class="fas fa-arrow-left"></i> Voltar às compras
            </a>
        </div>
    </header>

    <main class="carrinho-container">
        <div class="carrinho-items" id="carrinho-items">
            <!-- Items serão carregados aqui -->
        </div>
        
        <div class="carrinho-resumo" id="carrinho-resumo">
            <!-- Resumo será carregado aqui -->
        </div>
    </main>

    <script src="carrinho.js"></script>
</body>
</html>
