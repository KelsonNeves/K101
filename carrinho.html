<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Carrinho - Minha Loja de Adesivos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Permite seleção de texto apenas em inputs e áreas de texto */
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            -webkit-user-select: text;
            user-select: text;
        }
        /* Estilos adicionais para o campo de nome */
        .cliente-info {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }
        
        .cliente-info h3 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cliente-info h3 i {
            font-size: 1.3rem;
        }
        
        .campo-nome {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .campo-nome:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }
        
        .campo-nome.error {
            border-color: #ff4444;
            background-color: #fff8f8;
        }
        
        .mensagem-erro {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 4px;
        }
        
        .mensagem-erro.mostrar {
            display: flex;
        }
        
        .mensagem-erro i {
            font-size: 0.9rem;
        }
        
        .btn-finalizar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-finalizar:disabled:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Minha Logo" class="logo">
                <h1>Meu Carrinho</h1>
            </div>
            <a href="index.html" class="voltar-btn">
                <i class="fas fa-arrow-left"></i> Voltar às compras
            </a>
        </div>
    </header>

    <main class="carrinho-container">
        <div class="carrinho-items" id="carrinho-items">
            <!-- Items serão carregados aqui -->
        </div>
        
        <div class="carrinho-resumo" id="carrinho-resumo">
            <!-- Resumo será carregado aqui -->
        </div>
    </main>

    <script src="carrinho.js"></script>
</body>
</html>
